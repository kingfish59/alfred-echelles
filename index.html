<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Alfred Échelles">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Alfred Maquettes – Calcul d'Échelle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700&family=Barlow:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #161616;
      color: #FFFFFF;
      font-family: 'DM Sans', sans-serif;
      padding: 1rem;
      min-height: 100vh;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    
    .header {
      margin-bottom: 1.5rem;
    }
    
    .header h1 {
      font-family: 'Big Shoulders Display', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #D4A500;
      margin-bottom: 0.5rem;
    }
    
    .header p {
      font-size: 13px;
      color: #E0E0E0;
    }
    
    .divider {
      width: 60px;
      height: 2px;
      background: #D4A500;
      margin-bottom: 1.5rem;
    }
    
    .mode-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    
    .mode-btn {
      padding: 10px 16px;
      border: 0;
      background: transparent;
      color: #D4A500;
      border: 1px solid #D4A500;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      transition: all 0.2s;
    }
    
    .mode-btn:active {
      transform: scale(0.98);
    }
    
    .mode-btn.active {
      background: #D4A500;
      color: #161616;
      border-color: #D4A500;
    }
    
    .mode-section {
      display: none;
    }
    
    .mode-section.active {
      display: block;
    }
    
    .input-group {
      background: #2A2A2A;
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      border-left: 3px solid #D4A500;
    }
    
    .input-group label {
      display: block;
      font-size: 12px;
      color: #E0E0E0;
      margin-bottom: 8px;
    }
    
    .input-group input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #D4A500;
      border-radius: 4px;
      background: #161616;
      color: #D4A500;
      font-family: 'DM Sans', sans-serif;
    }
    
    .input-group input::placeholder {
      color: #888888;
    }
    
    .results {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    
    .result-box {
      background: #2A2A2A;
      padding: 1rem;
      border-radius: 6px;
      border: 2px solid #D4A500;
    }
    
    .result-box p:first-child {
      font-size: 11px;
      color: #E0E0E0;
      margin-bottom: 8px;
    }
    
    .result-box p:last-child {
      font-size: 24px;
      font-weight: 700;
      color: #D4A500;
      margin: 0;
      font-family: 'Barlow', sans-serif;
    }
    
    .footer {
      font-size: 11px;
      color: #E0E0E0;
      margin-top: 2rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Alfred Maquettes</h1>
      <p>Calcul d'échelle</p>
    </div>
    
    <div class="divider"></div>
    
    <div class="mode-buttons">
      <button class="mode-btn active" data-mode="1">Bâtiment + Maquette</button>
      <button class="mode-btn" data-mode="2">Bâtiment + Échelle</button>
      <button class="mode-btn" data-mode="3">Maquette + Échelle</button>
    </div>
    
    <!-- MODE 1 -->
    <div id="mode-1" class="mode-section active">
      <div class="input-group">
        <label>Taille du bâtiment réel (m)</label>
        <input type="number" id="m1-real" placeholder="ex: 45">
      </div>
      
      <div class="input-group">
        <label>Taille de la maquette (cm)</label>
        <input type="number" id="m1-model" placeholder="ex: 15">
      </div>
      
      <div class="results">
        <div class="result-box">
          <p>Échelle</p>
          <p id="m1-scale">—</p>
        </div>
        <div class="result-box">
          <p>Réduction</p>
          <p id="m1-reduction">—</p>
        </div>
      </div>
    </div>
    
    <!-- MODE 2 -->
    <div id="mode-2" class="mode-section">
      <div class="input-group">
        <label>Taille du bâtiment réel (m)</label>
        <input type="number" id="m2-real" placeholder="ex: 45">
      </div>
      
      <div class="input-group">
        <label>Échelle (1/X)</label>
        <input type="number" id="m2-scale" placeholder="ex: 200">
      </div>
      
      <div class="results">
        <div class="result-box">
          <p>Taille maquette</p>
          <p id="m2-model">—</p>
        </div>
        <div class="result-box">
          <p>Réduction</p>
          <p id="m2-reduction">—</p>
        </div>
      </div>
    </div>
    
    <!-- MODE 3 -->
    <div id="mode-3" class="mode-section">
      <div class="input-group">
        <label>Taille de la maquette (cm)</label>
        <input type="number" id="m3-model" placeholder="ex: 15">
      </div>
      
      <div class="input-group">
        <label>Échelle (1/X)</label>
        <input type="number" id="m3-scale" placeholder="ex: 200">
      </div>
      
      <div class="results">
        <div class="result-box">
          <p>Taille bâtiment</p>
          <p id="m3-real">—</p>
        </div>
        <div class="result-box">
          <p>Réduction</p>
          <p id="m3-reduction">—</p>
        </div>
      </div>
    </div>
    
    <div class="footer">
      Échelle = Réel ÷ Maquette  |  Maquette = Réel ÷ Échelle  |  Réduction % = 100 ÷ Échelle
    </div>
  </div>
  
  <script>
    // Mode 1: Bâtiment + Maquette = Échelle
    const m1Real = document.getElementById('m1-real');
    const m1Model = document.getElementById('m1-model');
    const m1Scale = document.getElementById('m1-scale');
    const m1Reduction = document.getElementById('m1-reduction');
    
    // Mode 2: Bâtiment + Échelle = Maquette
    const m2Real = document.getElementById('m2-real');
    const m2Scale = document.getElementById('m2-scale');
    const m2Model = document.getElementById('m2-model');
    const m2Reduction = document.getElementById('m2-reduction');
    
    // Mode 3: Maquette + Échelle = Bâtiment
    const m3Model = document.getElementById('m3-model');
    const m3Scale = document.getElementById('m3-scale');
    const m3Real = document.getElementById('m3-real');
    const m3Reduction = document.getElementById('m3-reduction');
    
    function format(num) {
      if (!num || isNaN(num)) return '—';
      if (num < 1) return num.toFixed(2);
      if (num < 100) return num.toFixed(1);
      return Math.round(num).toString();
    }
    
    function updateMode1() {
      const real = parseFloat(m1Real.value);
      const model = parseFloat(m1Model.value);
      if (!real || !model || real <= 0 || model <= 0) {
        m1Scale.textContent = '—';
        m1Reduction.textContent = '—';
        return;
      }
      const realCm = real * 100;
      const scale = Math.round(realCm / model);
      const reduction = (100 / scale).toFixed(2);
      m1Scale.textContent = '1/' + scale;
      m1Reduction.textContent = reduction + '%';
    }
    
    function updateMode2() {
      const real = parseFloat(m2Real.value);
      const scale = parseFloat(m2Scale.value);
      if (!real || !scale || real <= 0 || scale <= 0) {
        m2Model.textContent = '—';
        m2Reduction.textContent = '—';
        return;
      }
      const realCm = real * 100;
      const model = realCm / scale;
      const reduction = (100 / scale).toFixed(2);
      m2Model.textContent = format(model) + ' cm';
      m2Reduction.textContent = reduction + '%';
    }
    
    function updateMode3() {
      const model = parseFloat(m3Model.value);
      const scale = parseFloat(m3Scale.value);
      if (!model || !scale || model <= 0 || scale <= 0) {
        m3Real.textContent = '—';
        m3Reduction.textContent = '—';
        return;
      }
      const realCm = model * scale;
      const real = realCm / 100;
      const reduction = (100 / scale).toFixed(2);
      m3Real.textContent = format(real) + ' m';
      m3Reduction.textContent = reduction + '%';
    }
    
    m1Real.addEventListener('input', updateMode1);
    m1Model.addEventListener('input', updateMode1);
    m2Real.addEventListener('input', updateMode2);
    m2Scale.addEventListener('input', updateMode2);
    m3Model.addEventListener('input', updateMode3);
    m3Scale.addEventListener('input', updateMode3);
    
    function switchMode(mode) {
      document.getElementById('mode-1').classList.remove('active');
      document.getElementById('mode-2').classList.remove('active');
      document.getElementById('mode-3').classList.remove('active');
      document.getElementById('mode-' + mode).classList.add('active');
      
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector('[data-mode="' + mode + '"]').classList.add('active');
    }
    
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const mode = this.getAttribute('data-mode');
        switchMode(mode);
      });
    });
  </script>
</body>
</html>
